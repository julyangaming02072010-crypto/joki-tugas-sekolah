<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jasa Bantuan Tugas Sekolah</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#2563eb;--dark:#1f2937;--white:#fff;--gray:#6b7280;--light:#f3f4f6;--success:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif}
nav{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.1);position:sticky;top:0}
.nav-container{display:flex;justify-content:space-between;padding:1rem 2rem}
.nav-menu{display:flex;gap:1rem}
.hero{background:linear-gradient(135deg,#2563eb,#1e40af);color:#fff;text-align:center;padding:4rem 1rem}
.hero h1{font-size:2.5rem}
.btn{padding:.8rem 1.5rem;border-radius:8px;text-decoration:none;font-weight:600}
.btn-wa{background:#10b981;color:#fff}
section{padding:3rem 1rem;max-width:1100px;margin:auto}
.card{background:#f3f4f6;padding:1.5rem;border-radius:10px}
.grid{display:grid;gap:1.5rem}
@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>

<nav>
<div class="nav-container">
<strong>Jasa Tugas</strong>
<div class="nav-menu">
<a href="#layanan">Layanan</a>
<a href="#harga">Harga</a>
<a href="https://wa.me/62882001369811?text=Halo%20saya%20ingin%20order%20jasa%20tugas" class="btn btn-wa">Order</a>
</div>
</div>
</nav>

<section class="hero">
<h1>Jasa Bantuan Tugas Sekolah</h1>
<p>✔ Cepat ✔ Revisi ✔ Terpercaya</p>
<br>
<a href="https://wa.me/62882001369811?text=Halo%20saya%20ingin%20order" class="btn btn-wa">Chat WhatsApp</a>
</section>

<section id="layanan">
<h2>Layanan</h2>
<div class="grid">
<div class="card">Editing Video</div>
<div class="card">Editing Foto</div>
<div class="card">Essay & PPT</div>
</div>
</section>

<section id="harga">
<h2>Harga</h2>
<div class="grid">
<div class="card">Video: Rp30.000</div>
<div class="card">Foto: Rp2.000</div>
<div class="card">Lainnya: Mulai Rp10.000</div>
</div>
</section>

<section>
<h2>Testimoni</h2>
<form id="form">
<input id="nama" placeholder="Nama" required><br><br>
<textarea id="pesan" placeholder="Pesan" required></textarea><br><br>
<button>Kirim</button>
</form>
<div id="list"></div>
</section>

<script>
const form=document.getElementById('form')
const list=document.getElementById('list')

window.onload=()=>{
const data=localStorage.getItem('testi')
if(data) list.innerHTML=data
}

form.onsubmit=(e)=>{
e.preventDefault()
const nama=document.getElementById('nama').value
const pesan=document.getElementById('pesan').value

const html=`<div class='card'><b>${nama}</b><p>${pesan}</p></div>`
list.innerHTML=html+list.innerHTML
localStorage.setItem('testi',list.innerHTML)
form.reset()
}
</script>

</body>
</html>
